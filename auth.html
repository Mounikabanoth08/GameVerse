<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <title>GameVerse Access</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>GameVerse</h1>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="auth-btn" onclick="location.href='/dashboard'">LOGIN</button>
            <button class="auth-btn" style="background: transparent; border: 2px solid var(--neon);" onclick="location.href='/dashboard'">SIGN UP</button>
            <button class="auth-btn" style="background: gray;" onclick="location.href='/dashboard'">GUEST MODE</button>
        </div>
    </div>
</body>
</html>
