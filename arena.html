<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nebula Arena</title>
    <style>
        .arena-overlay { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            background: rgba(2, 6, 23, 0.95); 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hidden { display: none !important; }
        
        /* క్వశ్చన్ ఏరియా స్క్రోలింగ్ ఫిక్స్ */
        #quest-area { 
            width: 95%; 
            max-width: 650px; 
            margin: 20px auto; 
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #38bdf8;
            max-height: 400px;
            overflow-y: auto;
        }

        .active-mode { 
            background: #38bdf8 !important; 
            color: #020617 !important; 
            box-shadow: 0 0 20px #38bdf8;
            font-weight: bold;
        }

        .game-main-title {
            font-family: 'Orbitron', sans-serif;
            color: #38bdf8;
            font-size: 2.5rem;
            margin-top: 30px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .lvl-btn {
            transition: all 0.3s ease;
        }
        .lvl-btn:hover {
            background: #38bdf8 !important;
            color: black !important;
            transform: scale(1.1);
        }

        .clickable { cursor: pointer !important; }
    </style>
</head>
<body id="arena-body" style="background-color: #020617; background-size: cover; background-position: center; margin: 0;">

    <div class="arena-overlay">
        <div style="display:flex; flex-direction: column; align-items: center; width: 100%; padding: 10px 20px;">
            
            <h1 id="active-game-title" class="game-main-title">GAME NAME</h1>
            
            <div style="display:flex; justify-content: space-between; width: 90%; align-items: center; margin-top: 5px;">
                <button class="auth-btn clickable" onclick="goBack()" style="padding: 8px 20px;">⬅ BACK</button>
                
                <div id="score-box" style="border:1px solid #38bdf8; padding:10px 20px; border-radius:12px; background: rgba(56, 189, 248, 0.1);">
                    <h3 style="margin:0; font-size: 1rem;">
                        Global Score: <span id="current-score" style="color: #38bdf8;">0</span> 
                        <span style="margin: 0 10px; opacity: 0.3;">|</span> 
                        ⏳ Live: <span id="timer-val" style="color: #fbbf24;">0</span>s
                    </h3>
                </div>
            </div>
        </div>

        <hr style="width: 90%; border: 0.5px solid rgba(56, 189, 248, 0.1); margin: 20px 0;">

        <div id="selection-screen" style="text-align: center;">
            <div style="margin-bottom: 40px;">
                <h3 style="margin-bottom: 15px; color: #94a3b8; font-size: 0.9rem; letter-spacing: 1px;">CHOOSE PLAYER MODE</h3>
                <button class="auth-btn clickable mode-btn active-mode" onclick="setMode('Single', event)">Single</button>
                <button class="auth-btn clickable mode-btn" onclick="setMode('2 Players', event)">2 Players</button>
                <button class="auth-btn clickable mode-btn" onclick="setMode('Group', event)">Group</button>
            </div>
            
            <h3 style="margin-bottom: 15px; color: #94a3b8; font-size: 0.9rem; letter-spacing: 1px;">SELECT DIFFICULTY</h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="auth-btn clickable" onclick="showLevels(10, 'Easy')" style="border-color: #10b981;">EASY</button>
                <button class="auth-btn clickable" onclick="showLevels(15, 'Medium')" style="border-color: #fbbf24;">MEDIUM</button>
                <button class="auth-btn clickable" onclick="showLevels(20, 'Hard')" style="border-color: #ef4444;">HARD</button>
            </div>
        </div>

        <div id="map-screen" class="hidden" style="text-align: center; width: 100%;">
            <h2 style="color: #38bdf8; margin-bottom: 25px;">Select Level</h2>
            <div id="map-grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 0 40px;"></div>
        </div>

        <div id="play-screen" class="hidden" style="text-align: center; width: 100%; padding-bottom: 40px;">
            <h2 id="lvl-txt" style="color: #fbbf24; margin-bottom: 20px; font-family: 'Orbitron';">Level 1</h2>
            <div id="quest-area"></div> 
            <button class="auth-btn clickable" style="background: #10b981; color: white; width: 280px; margin-top: 30px; font-weight: bold; border: none;" onclick="validateLevel()">SUBMIT ANSWERS</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        
        window.onload = function() {
            if (typeof initArena === 'function') initArena();
        };
    </script>
</body>
</html>
